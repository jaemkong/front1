<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 캐나다 여행</title>
</head>
<body>

    <h1>🍁 나의 캐나다 여행 앨범 🎵</h1>

    <audio controls>
        <source src="media/canada.mp3" type="audio/mpeg">
    </audio>

    <hr>


    <figure>
        <img src="media/banff.jpg" alt="밴프 국립공원의 호수와 로키산맥" width="500">
        <figcaption>밴프 국립공원 - 청록빛 호수와 로키산맥</figcaption>
    </figure>

    <figure>
        <img src="media/niagara.jpeg" alt="나이아가라 폭포" width="500">
        <figcaption>나이아가라 폭포 - 웅장한 물줄기와 시원한 물안개</figcaption>
    </figure>

    <figure>
        <img src="media/vancouver.jpeg" alt="밴쿠버 야경" width="500">
        <figcaption>밴쿠버 - 바다와 도시가 함께 빛나는 야경</figcaption>
    </figure>

    <hr>

    <h2>🎥 캐나다 여행 영상</h2>
    <figure>
            <video controls width="500">
            <source src="media/canada.MOV" >
            </video>
            <figcaption>캐나다에서 먹은 줄돔🐠</figcaption>
    </figure>



</body>
</html>
