<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>

    <!-- 공통 CSS 연결 -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container">
        <form action="signUpResult.html" method="get">
            <h1>회원가입하기</h1>
            <p class="required-guide">
                <span class="required">*</span> 표시는 필수 입력 항목입니다.
            </p>
            <fieldset>
                <legend>계정 정보</legend>
                <p>
                    <label for="userId">아이디 <span class="required">* </span>:</label>
                    <input type="text" id="userId" name="userId" minlength="4" maxlength="15" required
                        placeholder="4~15자 영문/숫자">

                </p>

                <p>
                    <label for="userPw">비밀번호 <span class="required">* </span>:</label>
                    <input type="password" id="userPw" name="userPw" minlength="8" required placeholder="8자 이상 입력">

                </p>

                <p>
                    <label for="userEmail">이메일 <span class="required">* </span>: </label>
                    <input type="text" id="userEmail" name="userEmail" required placeholder="example">
                    @
                    <select name="emailDomain">
                        <option value="direct">직접 입력</option>
                        <option value="naver.com">naver.com</option>
                        <option value="gmail.com">gmail.com</option>
                        <option value="daum.net">daum.net</option>
                    </select>
                </p>
            </fieldset>


            <fieldset>
                <legend>개인 프로필 정보</legend>
                <p>
                    <label for="userName">이름 <span class="required">* </span>: </label>
                    <input type="text" id="userName" name="userName" required>
                </p>

                <p>
                    <label for="userBirth">생년월일 <span class="required">* </span>: </label>
                    <input type="date" id="userBirth" name="userBirth" required>
                </p>


                <p>
                    성별 <span class="required">* </span>:
                    <label><input type="radio" name="gender" value="male" checked> 남성</label>
                    <label><input type="radio" name="gender" value="female"> 여성</label>
                    <label><input type="radio" name="gender" value="none"> 선택안함</label>
                </p>


                <p>
                    관심 분야 (중복 선택 가능): <br>
                    <label><input type="checkbox" name="interest" value="frontend"> 웹 프론트엔드 (Vue.js/HTML)</label><br>
                    <label><input type="checkbox" name="interest" value="uiux"> UI/UX 디자인 표준</label><br>
                    <label><input type="checkbox" name="interest" value="backend"> 백엔드 & 데이터베이스</label><br>
                    <label><input type="checkbox" name="interest" value="devops"> 클라우드 & 인프라</label>
                </p>
            </fieldset>



            <fieldset>
                <legend>자기소개</legend>
                <p>
                    <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사:</label><br>
                    <textarea id="intro" name="intro" rows="5" cols="50"
                        placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
                </p>
            </fieldset>
            <br>
            <input type="submit" value="동의하고 회원가입">
            <input type="reset" value="다시 작성">
        </form>
    </div>

</body>

</html>
